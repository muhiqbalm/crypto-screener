name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Redeploy Docker on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Trigger redeploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd ~/crypto-screener
            chmod +x ./deploy.sh
            ./deploy.sh --build
