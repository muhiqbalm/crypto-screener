services:
  # ── Crypto Screener API ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-screener-api
    restart: unless-stopped
    ports:
      - "${SCREENER_API_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Persist logs outside the container
      - ./output/logs:/app/output/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start-period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
